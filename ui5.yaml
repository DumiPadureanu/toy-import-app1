specVersion: '3.1'
type: application
metadata:
  name: toy-import-app
framework:
  name: SAPUI5
  version: '1.120.0'
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.ui.table
    - name: sap.fe.templates
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        backend:
          - path: /odata
            url: http://localhost:4004
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: app
